name: Build Desktop App

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: ContentPilot-windows
          - os: macos-latest
            artifact_name: ContentPilot-macos
          - os: ubuntu-latest
            artifact_name: ContentPilot-linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests flask pywebview pyinstaller
          pip install PyQt5 PyQtWebEngine qtpy
          pip install -e .

      - name: Build executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --name ContentPilot --onefile --windowed --clean \
            --add-data "src/contentpilot:src/contentpilot" \
            --add-data "web/templates:web/templates" \
            --add-data "web/static:web/static" \
            --add-data "templates:templates" \
            --add-data "workspace/config.template.yaml:workspace" \
            --add-data "workspace/voice.md:workspace" \
            --hidden-import contentpilot --hidden-import contentpilot.interface.cli \
            --hidden-import contentpilot.application.service \
            --hidden-import contentpilot.domain.stages --hidden-import contentpilot.domain.gates \
            --hidden-import contentpilot.infrastructure.config \
            --hidden-import contentpilot.infrastructure.journal \
            --hidden-import contentpilot.infrastructure.draft_store \
            --hidden-import contentpilot.infrastructure.idea_bank \
            --hidden-import contentpilot.infrastructure.publisher \
            --hidden-import contentpilot.infrastructure.notifier \
            --hidden-import contentpilot.infrastructure.image_host \
            --hidden-import contentpilot.infrastructure.clock \
            --hidden-import contentpilot.infrastructure.html \
            --hidden-import contentpilot.license --hidden-import contentpilot.seo \
            --hidden-import contentpilot.blogger \
            --hidden-import contentpilot.sync --hidden-import contentpilot.sync.client \
            --hidden-import contentpilot.sync.cache \
            --collect-all webview --collect-all qtpy \
            web/desktop.py

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          pyinstaller --name ContentPilot --onefile --windowed --clean \
            --add-data "src/contentpilot;src/contentpilot" \
            --add-data "web/templates;web/templates" \
            --add-data "web/static;web/static" \
            --add-data "templates;templates" \
            --add-data "workspace/config.template.yaml;workspace" \
            --add-data "workspace/voice.md;workspace" \
            --hidden-import contentpilot --hidden-import contentpilot.interface.cli \
            --hidden-import contentpilot.application.service \
            --hidden-import contentpilot.domain.stages --hidden-import contentpilot.domain.gates \
            --hidden-import contentpilot.infrastructure.config \
            --hidden-import contentpilot.infrastructure.journal \
            --hidden-import contentpilot.infrastructure.draft_store \
            --hidden-import contentpilot.infrastructure.idea_bank \
            --hidden-import contentpilot.infrastructure.publisher \
            --hidden-import contentpilot.infrastructure.notifier \
            --hidden-import contentpilot.infrastructure.image_host \
            --hidden-import contentpilot.infrastructure.clock \
            --hidden-import contentpilot.infrastructure.html \
            --hidden-import contentpilot.license --hidden-import contentpilot.seo \
            --hidden-import contentpilot.blogger \
            --hidden-import contentpilot.sync --hidden-import contentpilot.sync.client \
            --hidden-import contentpilot.sync.cache \
            --collect-all webview --collect-all qtpy \
            web/desktop.py

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/ContentPilot-windows/ContentPilot.exe
            artifacts/ContentPilot-macos/ContentPilot.app/**
            artifacts/ContentPilot-linux/ContentPilot
          generate_release_notes: true
