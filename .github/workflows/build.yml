name: Build Desktop App

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: ContentPilot-windows
            asset_name: ContentPilot.exe
          - os: macos-latest
            artifact_name: ContentPilot-macos
            asset_name: ContentPilot.app
          - os: ubuntu-latest
            artifact_name: ContentPilot-linux
            asset_name: ContentPilot

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-3.0 gir1.2-webkit2-4.0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests flask pywebview pyinstaller
          pip install PyQt5 PyQtWebEngine qtpy

      - name: Build executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller \
            --name ContentPilot \
            --onefile \
            --windowed \
            --clean \
            --add-data "src/contentpilot:src/contentpilot" \
            --add-data "web/templates:web/templates" \
            --add-data "web/static:web/static" \
            --add-data "templates:templates" \
            --add-data "workspace/config.template.yaml:workspace" \
            --add-data "workspace/voice.md:workspace" \
            --hidden-import contentpilot \
            --hidden-import contentpilot.interface.cli \
            --hidden-import contentpilot.application.service \
            --hidden-import contentpilot.domain.stages \
            --hidden-import contentpilot.domain.gates \
            --hidden-import contentpilot.infrastructure.config \
            --hidden-import contentpilot.infrastructure.journal \
            --hidden-import contentpilot.infrastructure.draft_store \
            --hidden-import contentpilot.infrastructure.idea_bank \
            --hidden-import contentpilot.infrastructure.publisher \
            --hidden-import contentpilot.infrastructure.notifier \
            --hidden-import contentpilot.infrastructure.image_host \
            --hidden-import contentpilot.infrastructure.clock \
            --hidden-import contentpilot.infrastructure.html \
            --hidden-import contentpilot.license \
            --hidden-import contentpilot.seo \
            --hidden-import contentpilot.blogger \
            --collect-all webview \
            --collect-all qtpy \
            web/desktop.py

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller ^
            --name ContentPilot ^
            --onefile ^
            --windowed ^
            --clean ^
            --add-data "src/contentpilot;src/contentpilot" ^
            --add-data "web/templates;web/templates" ^
            --add-data "web/static;web/static" ^
            --add-data "templates;templates" ^
            --add-data "workspace/config.template.yaml;workspace" ^
            --add-data "workspace/voice.md;workspace" ^
            --hidden-import contentpilot ^
            --hidden-import contentpilot.interface.cli ^
            --hidden-import contentpilot.application.service ^
            --hidden-import contentpilot.domain.stages ^
            --hidden-import contentpilot.domain.gates ^
            --hidden-import contentpilot.infrastructure.config ^
            --hidden-import contentpilot.infrastructure.journal ^
            --hidden-import contentpilot.infrastructure.draft_store ^
            --hidden-import contentpilot.infrastructure.idea_bank ^
            --hidden-import contentpilot.infrastructure.publisher ^
            --hidden-import contentpilot.infrastructure.notifier ^
            --hidden-import contentpilot.infrastructure.image_host ^
            --hidden-import contentpilot.infrastructure.clock ^
            --hidden-import contentpilot.infrastructure.html ^
            --hidden-import contentpilot.license ^
            --hidden-import contentpilot.seo ^
            --hidden-import contentpilot.blogger ^
            --collect-all webview ^
            --collect-all qtpy ^
            web\desktop.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ContentPilot-windows/ContentPilot.exe
            artifacts/ContentPilot-macos/ContentPilot.app/**
            artifacts/ContentPilot-linux/ContentPilot
          generate_release_notes: true
          draft: false
          prerelease: false
