<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContentPilot — Settings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; }
        
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .navbar h1 { font-size: 24px; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: white; text-decoration: none; opacity: 0.8; }
        .nav-links a:hover { opacity: 1; }
        
        .container { max-width: 800px; margin: 0 auto; padding: 40px; }
        
        .section {
            background: white; border-radius: 15px; padding: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 30px;
        }
        
        .section h2 { color: #333; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; margin-bottom: 8px; color: #333; font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; border: 2px solid #e0e0e0;
            border-radius: 8px; font-size: 14px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: #667eea;
        }
        
        .form-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 12px 30px;
            border-radius: 8px; font-size: 14px; cursor: pointer;
        }
        
        .btn:hover { transform: translateY(-2px); }
        
        .help-text { color: #666; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>✨ ContentPilot</h1>
        <div class="nav-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/articles">Articles</a>
            <a href="/settings">Settings</a>
        </div>
    </div>
    
    <div class="container">
        <div class="section">
            <h2>⚙️ Settings</h2>
            
            <form method="POST" action="/settings">
                <div class="section">
                    <h3>Blog Configuration</h3>
                    
                    <div class="form-group">
                        <label>Domain</label>
                        <input type="text" name="domain" value="{{ config.domain|default('') }}" placeholder="myblog.com">
                        <p class="help-text">Your blog domain name</p>
                    </div>
                    
                    <div class="form-group">
                        <label>Blogger Blog ID</label>
                        <input type="text" name="blog_id" value="{{ config.blog_id|default('') }}" placeholder="1234567890">
                        <p class="help-text">Found in Blogger settings</p>
                    </div>
                </div>
                
                <div class="section">
                    <h3>AI Provider</h3>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Provider</label>
                            <select name="ai_provider">
                                <option value="openai" {% if config.ai.provider|default('openai') == 'openai' %}selected{% endif %}>OpenAI</option>
                                <option value="deepseek" {% if config.ai.provider|default('') == 'deepseek' %}selected{% endif %}>DeepSeek</option>
                                <option value="ollama" {% if config.ai.provider|default('') == 'ollama' %}selected{% endif %}>Ollama (Local)</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Model</label>
                            <input type="text" name="ai_model" value="{{ config.ai.model|default('gpt-4') }}" placeholder="gpt-4">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>API Key</label>
                        <input type="password" name="ai_api_key" value="{{ config.ai.api_key|default('') }}" placeholder="sk-...">
                        <p class="help-text">Your AI provider API key</p>
                    </div>
                </div>
                
                <div class="section">
                    <h3>Pipeline Settings</h3>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>WIP Limit</label>
                            <input type="number" name="wip_limit" value="{{ config.pipeline.wip_limit|default(3) }}" min="1" max="10">
                            <p class="help-text">Max articles in progress</p>
                        </div>
                        
                        <div class="form-group">
                            <label>Publish Mode</label>
                            <select name="publish_mode">
                                <option value="draft" {% if config.pipeline.publish_mode|default('draft') == 'draft' %}selected{% endif %}>Draft</option>
                                <option value="live" {% if config.pipeline.publish_mode|default('') == 'live' %}selected{% endif %}>Live</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn">Save Settings</button>
            </form>
        </div>
    </div>
</body>
</html>
