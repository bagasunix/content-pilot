// Open help modal
function openHelp(topic) {
    const modal = document.getElementById('help-modal');
    const content = document.getElementById('help-content');
    
    const guide = helpGuides[topic];
    if (!guide) return;
    
    let html = `<h3 class="text-lg font-semibold text-white mb-4">${guide.title}</h3>`;
    
    guide.sections.forEach(section => {
        html += `
            <div class="bg-surface-800/50 rounded-xl p-4">
                <h4 class="font-medium text-white mb-2">${section.title}</h4>
                <div class="text-sm">${section.content}</div>
            </div>
        `;
    });
    
    content.innerHTML = html;
    modal.classList.remove('hidden');
}

// Close help modal
function closeHelp() {
    document.getElementById('help-modal').classList.add('hidden');
}

// Close on outside click
document.getElementById('help-modal').addEventListener('click', function(e) {
    if (e.target === this) closeHelp();
});

// Close on Escape key
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeHelp();
});
</script>
