<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContentPilot — Articles</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-card-hover: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); }

        .navbar {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { display: flex; align-items: center; gap: 12px; font-size: 24px; font-weight: 700; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .nav-links { display: flex; gap: 8px; }
        .nav-link { padding: 10px 20px; border-radius: 10px; color: var(--text-muted); text-decoration: none; transition: all 0.3s ease; font-weight: 500; }
        .nav-link:hover, .nav-link.active { background: var(--glass); color: var(--text); }
        .nav-link.active { background: var(--primary); color: white; }
        .user-section { display: flex; align-items: center; gap: 16px; }
        .tier-badge { padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-weight: 600; }

        .container { max-width: 1400px; margin: 0 auto; padding: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 28px; font-weight: 700; }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3); }

        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .filter-btn:hover, .filter-btn.active { background: var(--primary); border-color: var(--primary); color: white; }

        .card {
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }

        .card:hover { border-color: var(--primary); transform: translateY(-2px); }

        .article-card {
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            gap: 20px;
            align-items: center;
            padding: 20px 24px;
        }

        .article-status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .article-status.published { background: var(--success); box-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        .article-status.draft { background: var(--warning); box-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
        .article-status.reviewing { background: var(--primary); box-shadow: 0 0 10px rgba(99, 102, 241, 0.5); }
        .article-status.researching { background: var(--secondary); box-shadow: 0 0 10px rgba(139, 92, 246, 0.5); }

        .article-info h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
        .article-meta { font-size: 13px; color: var(--text-muted); display: flex; gap: 16px; }

        .article-stats { display: flex; gap: 20px; }
        .article-stat { text-align: center; }
        .article-stat-value { font-size: 18px; font-weight: 700; color: var(--primary); }
        .article-stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }

        .article-actions { display: flex; gap: 8px; }
        .action-btn { padding: 8px 16px; background: var(--glass); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; cursor: pointer; transition: all 0.3s ease; }
        .action-btn:hover { background: var(--primary); border-color: var(--primary); }
        .action-btn.danger:hover { background: var(--danger); border-color: var(--danger); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
        .empty-state h3 { margin-bottom: 8px; color: var(--text); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card { animation: fadeIn 0.5s ease forwards; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon">✈️</div>
            <span>ContentPilot</span>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link">Dashboard</a>
            <a href="/articles" class="nav-link active">Articles</a>
            <a href="/trending" class="nav-link">Trending</a>
            <a href="/settings" class="nav-link">Settings</a>
        </div>
        <div class="user-section">
            <span class="tier-badge">FREE</span>
            <div class="avatar">A</div>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1>📚 Articles</h1>
            <a href="/trending" class="btn btn-primary">
                <i class="fas fa-plus"></i> New Article
            </a>
        </div>

        <div class="filters">
            <button class="filter-btn active">All</button>
            <button class="filter-btn">Published</button>
            <button class="filter-btn">Draft</button>
            <button class="filter-btn">Reviewing</button>
            <button class="filter-btn">Researching</button>
        </div>

        <div id="articles-list">
            <div class="empty-state">
                <i class="fas fa-newspaper"></i>
                <h3>No articles yet</h3>
                <p>Start by finding trending topics or writing a new article</p>
                <a href="/trending" class="btn btn-primary" style="margin-top: 20px;">
                    <i class="fas fa-fire"></i> Find Topics
                </a>
            </div>
        </div>
    </div>

    <script>
        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
    </script>
</body>
</html>
