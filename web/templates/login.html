{% extends "base.html" %}

{% block title %}ContentPilot — Login{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-surface-950 via-primary-950/20 to-surface-950 p-4">
    
    <!-- Login Card -->
    <div class="w-full max-w-md">
        <div class="bg-surface-900/80 backdrop-blur-xl border border-surface-700/50 rounded-2xl p-8 shadow-2xl">
            
            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-primary-500 to-purple-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-primary-500/25">
                    <i data-lucide="rocket" class="w-8 h-8 text-white"></i>
                </div>
                <h1 class="text-2xl font-bold text-white">Welcome Back</h1>
                <p class="text-surface-400 mt-2">Login to your ContentPilot account</p>
            </div>
            
            <!-- Error Message -->
            {% if error %}
            <div class="mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-xl flex items-center gap-3">
                <i data-lucide="alert-circle" class="w-5 h-5 text-red-400 flex-shrink-0"></i>
                <p class="text-sm text-red-400">{{ error }}</p>
            </div>
            {% endif %}
            
            <!-- Form -->
            <form method="POST" action="/login" class="space-y-6">
                
                <!-- License Key Input -->
                <div>
                    <label for="key" class="block text-sm font-medium text-surface-300 mb-2">License Key</label>
                    <input type="text" 
                           id="key" 
                           name="key"
                           required
                           placeholder="CP-XXXX-XXXX"
                           class="w-full px-4 py-3 bg-surface-800 border border-surface-600 rounded-xl text-white placeholder-surface-500 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all font-mono text-center text-lg tracking-wider">
                </div>
                
                <!-- Remember Me -->
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" name="remember" class="w-4 h-4 bg-surface-800 border-surface-600 rounded text-primary-500 focus:ring-primary-500">
                        <span class="text-sm text-surface-400">Remember me</span>
                    </label>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" 
                        class="w-full py-3 px-4 bg-gradient-to-r from-primary-500 to-purple-500 hover:from-primary-600 hover:to-purple-600 text-white font-semibold rounded-xl shadow-lg shadow-primary-500/25 transition-all hover:shadow-xl hover:shadow-primary-500/30 transform hover:-translate-y-0.5">
                    Login
                </button>
            </form>
            
            <!-- Footer -->
            <div class="mt-6 text-center">
                <p class="text-sm text-surface-500">
                    Don't have a key? 
                    <a href="https://contentpilot.dev/pricing" class="text-primary-400 hover:text-primary-300 font-medium">Get a free key</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
